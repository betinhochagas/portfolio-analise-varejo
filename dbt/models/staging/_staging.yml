version: 2

models:
  - name: stg_vendas
    description: "Vendas padronizadas (staging), uma linha por venda_id."
    columns:
      - name: venda_id
        description: "Chave da venda."
        data_tests:
          - unique
          - not_null
      - name: valor_total
        description: "Faturamento da venda (preco * qtd - desconto)."
        data_tests:
          - not_null
