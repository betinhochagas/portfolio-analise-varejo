name: CI

# Validacao a cada Pull Request e push na main.
# NAO precisa de credenciais: `dbt parse` valida refs/sources/macros sem
# conectar ao BigQuery.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  dbt-validate:
    name: Validar projeto dbt (parse)
    runs-on: ubuntu-latest
    env:
      GCP_PROJECT_ID: ci-dummy-project        # parse nao conecta; valor ficticio
      DBT_PROFILES_DIR: ${{ github.workspace }}/ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Instalar dbt-bigquery
        run: pip install dbt-bigquery==1.8.2
      - name: dbt deps
        working-directory: dbt
        run: dbt deps
      - name: dbt parse (valida refs, sources e macros)
        working-directory: dbt
        run: dbt parse

  # NOTA: o lint de SQL com sqlfluff foi removido do CI por enquanto — com o
  # templater jinja ele nao resolve macros do dbt_utils (ex.: generate_surrogate_key)
  # e falha. Para reativar de forma robusta, use o templater dbt (sqlfluff-templater-dbt),
  # que compila via dbt e exige credenciais do BigQuery no CI (service account).
